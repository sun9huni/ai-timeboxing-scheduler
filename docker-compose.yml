version: '3.8'

services:
  ai-scheduler:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./credentials.json:/app/credentials.json:ro  # Google API 인증 파일
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped







